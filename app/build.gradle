plugins {
    id 'com.android.application'
}

android {
    namespace 'com.applemusic.tablet'
    compileSdk 34

    defaultConfig {
        applicationId "com.applemusic.tablet"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file("${rootProject.projectDir}/app-release.jks")
            storePassword "applemusic123"
            keyAlias "apple-music"
            keyPassword "applemusic123"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
